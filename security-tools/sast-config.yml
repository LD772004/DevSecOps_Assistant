# ═══════════════════════════════════════════════════════════
#  sast-config.yml — Configuration Semgrep SAST
# ═══════════════════════════════════════════════════════════

# Configuration Semgrep pour le scan SAST
# https://semgrep.dev/docs/writing-rules/rule-syntax/

rules:
  # ─── Injection ───────────────────────────────────────────

  - id: hardcoded-secret-env
    patterns:
      - pattern: |
          const $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(password|secret|token|key|api_key|private_key)'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '.{8,}'
    message: "Secret potentiellement codé en dur dans $VAR. Utilisez des variables d'environnement."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"

  - id: sql-injection-risk
    patterns:
      - pattern: |
          $DB.query($STR + $VAR)
    message: "Risque d'injection SQL: concaténation directe dans une requête. Utilisez des requêtes paramétrées."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"

  - id: eval-usage
    pattern: eval(...)
    message: "Utilisation de eval() détectée. Risque d'injection de code."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-95"

  - id: dangerous-child-process
    patterns:
      - pattern: exec($CMD)
      - pattern: execSync($CMD)
    message: "Exécution de commande shell. Vérifiez que les entrées sont correctement validées."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021 - Injection"

  # ─── Crypto ──────────────────────────────────────────────

  - id: weak-crypto-md5
    patterns:
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash("md5")
    message: "MD5 est un algorithme de hachage faible. Utilisez SHA-256 ou bcrypt pour les mots de passe."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-327"

  - id: weak-crypto-sha1
    patterns:
      - pattern: crypto.createHash('sha1')
      - pattern: crypto.createHash("sha1")
    message: "SHA-1 est un algorithme de hachage obsolète. Utilisez SHA-256 ou plus."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-327"

  # ─── Authentification ─────────────────────────────────────

  - id: jwt-no-expiry
    patterns:
      - pattern: jwt.sign($PAYLOAD, $SECRET)
      - pattern-not: jwt.sign($PAYLOAD, $SECRET, {..., expiresIn: ..., ...})
    message: "Token JWT sans date d'expiration (expiresIn). Cela peut entraîner des tokens valides indéfiniment."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-613"

  # ─── HTTP Sécurité ───────────────────────────────────────

  - id: cors-all-origins
    patterns:
      - pattern: cors({origin: '*'})
      - pattern: res.setHeader('Access-Control-Allow-Origin', '*')
    message: "CORS configuré pour accepter toutes les origines. Restreignez aux domaines autorisés."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-942"

  - id: helmet-missing
    patterns:
      - pattern: |
          const $APP = express()
          ...
          $APP.listen(...)
      - pattern-not: |
          const $APP = express()
          ...
          $APP.use(helmet())
          ...
    message: "L'application Express n'utilise pas helmet(). Ajoutez les en-têtes de sécurité HTTP."
    severity: INFO
    languages: [javascript]

  # ─── Secrets exposés ─────────────────────────────────────

  - id: private-key-in-code
    pattern-regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
    message: "Clé privée détectée dans le code source ! Supprimez-la immédiatement et révoquez-la."
    severity: ERROR
    languages: [javascript, typescript, yaml, json]
    metadata:
      cwe: "CWE-312"

  - id: telegram-token-exposed
    pattern-regex: '\d{8,10}:[A-Za-z0-9_-]{35}'
    message: "Token Telegram Bot potentiellement exposé dans le code."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-798"
