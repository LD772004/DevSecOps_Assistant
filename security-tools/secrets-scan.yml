# ═══════════════════════════════════════════════════════════
#  secrets-scan.yml — Configuration Gitleaks (détection secrets)
# ═══════════════════════════════════════════════════════════
# Format: .gitleaks.toml compatible
# https://github.com/gitleaks/gitleaks

title = "DevSecOps Agent - Gitleaks Config"

[extend]
# Étendre les règles par défaut de Gitleaks
useDefault = true

# ─────────────────────────────────────────────
#  Règles personnalisées
# ─────────────────────────────────────────────

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot Token"
regex = '''\d{8,10}:[A-Za-z0-9_-]{35}'''
tags = ["telegram", "secret", "critical"]
severity = "CRITICAL"

[[rules]]
id = "gitlab-personal-access-token"
description = "GitLab Personal Access Token"
regex = '''glpat-[a-zA-Z0-9\-]{20}'''
tags = ["gitlab", "pat", "critical"]
severity = "CRITICAL"

[[rules]]
id = "gitlab-runner-token"
description = "GitLab Runner Registration Token"
regex = '''GR1348941[a-zA-Z0-9_-]{20}'''
tags = ["gitlab", "runner"]
severity = "HIGH"

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9\-_]{32,}'''
tags = ["anthropic", "api-key", "critical"]
severity = "CRITICAL"

[[rules]]
id = "docker-hub-password"
description = "Docker Hub Password dans les configs"
regex = '''(?i)docker[_-]?(?:hub[_-]?)?password\s*[=:]\s*["']?[A-Za-z0-9+/]{8,}'''
tags = ["docker", "credential"]
severity = "HIGH"

[[rules]]
id = "generic-api-key"
description = "Clé API générique"
regex = '''(?i)(?:api[_-]?key|apikey)\s*[=:]\s*["']?[A-Za-z0-9+/]{16,}'''
tags = ["api-key", "generic"]
severity = "HIGH"

[[rules]]
id = "private-key-pem"
description = "Clé privée PEM"
regex = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
tags = ["private-key", "crypto", "critical"]
severity = "CRITICAL"

[[rules]]
id = "jwt-secret"
description = "JWT Secret dans le code"
regex = '''(?i)jwt[_-]?secret\s*[=:]\s*["']?[A-Za-z0-9+/!@#$%^&*]{8,}'''
tags = ["jwt", "secret"]
severity = "HIGH"

# ─────────────────────────────────────────────
#  Allowlist — Faux positifs connus
# ─────────────────────────────────────────────

[allowlist]
description = "Exclusions globales"

# Fichiers à ignorer
paths = [
  '''^\.git/''',
  '''node_modules''',
  '''\.env\.example''',
  '''\.env\.sample''',
  '''\.env\.test''',
  '''CHANGELOG''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''tests?/''',
  '''__tests__/''',
  '''__mocks__/''',
  '''fixtures/''',
]

# Commits à ignorer (ex: commit de nettoyage)
commits = []

# Regex de valeurs à ignorer (ex: valeurs de test évidentes)
regexes = [
  '''(?i)(?:example|dummy|fake|test|sample|placeholder|changeme|your[_-]?token|xxx+|aaa+|yyy+)''',
  '''1234567890:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA''',
]

# ─────────────────────────────────────────────
#  Politique de scan
# ─────────────────────────────────────────────
[policy]
# Bloquer le pipeline si un secret est détecté
fail_on_detection = true

# Scanner l'historique git complet
scan_history = true

# Profondeur de l'historique à scanner (0 = tout)
history_depth = 0

# Activer le pré-commit hook
precommit_hook = true
