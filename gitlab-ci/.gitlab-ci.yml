# ═══════════════════════════════════════════════════════════
#  .gitlab-ci.yml — Pipeline DevSecOps complet
#  Stages: build → test → sast → scan → deploy → notify
# ═══════════════════════════════════════════════════════════

image: node:20-alpine

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  DEPLOY_ENV: ${DEPLOY_ENV:-staging}
  # Flags de contrôle
  SECURITY_SCAN_ONLY: ${SECURITY_SCAN_ONLY:-false}
  MANUAL_DEPLOY: ${MANUAL_DEPLOY:-false}
  ROLLBACK: ${ROLLBACK:-false}

# ─────────────────────────────────────────────
#  Étapes du pipeline
# ─────────────────────────────────────────────
stages:
  - build
  - test
  - sast
  - dependency_scanning
  - container_scanning
  - secret_detection
  - deploy
  - notify

# ─────────────────────────────────────────────
#  Cache global
# ─────────────────────────────────────────────
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - .npm/

# ─────────────────────────────────────────────
#  BUILD
# ─────────────────────────────────────────────
build:app:
  stage: build
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build --if-present
  artifacts:
    paths:
      - dist/
      - node_modules/
    expire_in: 1 hour
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - when: always

build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --cache-from $DOCKER_IMAGE_LATEST -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─────────────────────────────────────────────
#  TEST
# ─────────────────────────────────────────────
test:unit:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test -- --coverage --passWithNoTests
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
      junit: test-results.xml
  rules:
    - if: $SECURITY_SCAN_ONLY == "true"
      when: never
    - if: $ROLLBACK == "true"
      when: never
    - when: always

test:lint:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run lint --if-present
  allow_failure: true
  rules:
    - if: $SECURITY_SCAN_ONLY == "true"
      when: never
    - if: $ROLLBACK == "true"
      when: never
    - when: always

# ─────────────────────────────────────────────
#  SAST — Analyse statique du code
# ─────────────────────────────────────────────
sast:semgrep:
  stage: sast
  image: returntocorp/semgrep:latest
  script:
    - semgrep ci
      --config=auto
      --json
      --output=gl-sast-report.json
      --metrics=off
      || true
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    when: always
    expire_in: 1 week
  variables:
    SEMGREP_APP_TOKEN: $SEMGREP_APP_TOKEN
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - when: always

# GitLab SAST intégré (Bandit, ESLint Security, etc.)
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Surcharge des variables GitLab Security
variables:
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, node_modules"
  DS_EXCLUDED_PATHS: "node_modules"
  CS_IMAGE: $DOCKER_IMAGE
  SECRET_DETECTION_HISTORIC_SCAN: "true"

# ─────────────────────────────────────────────
#  DEPENDENCY SCANNING — npm audit avancé
# ─────────────────────────────────────────────
scan:npm-audit:
  stage: dependency_scanning
  script:
    - npm ci --cache .npm --prefer-offline
    - npm audit --json > npm-audit-report.json 2>&1 || true
    - |
      CRITICAL=$(cat npm-audit-report.json | python3 -c "
      import json,sys
      d=json.load(sys.stdin)
      print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo 0)
      echo "Vulnérabilités critiques npm: $CRITICAL"
      if [ "$CRITICAL" -gt "0" ]; then
        echo "⚠️  $CRITICAL vulnérabilités critiques détectées dans les dépendances npm"
      fi
  artifacts:
    paths:
      - npm-audit-report.json
    when: always
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - when: always

# ─────────────────────────────────────────────
#  CONTAINER SCANNING — Trivy
# ─────────────────────────────────────────────
scan:trivy:
  stage: container_scanning
  image: aquasec/trivy:latest
  script:
    - trivy image
      --format json
      --output trivy-report.json
      --exit-code 0
      --severity CRITICAL,HIGH
      --ignore-unfixed
      $DOCKER_IMAGE
    - trivy image
      --format table
      --severity CRITICAL,HIGH
      --ignore-unfixed
      $DOCKER_IMAGE
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $SECURITY_SCAN_ONLY == "true"

# ─────────────────────────────────────────────
#  SECRET DETECTION — Gitleaks
# ─────────────────────────────────────────────
scan:gitleaks:
  stage: secret_detection
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect
      --source="."
      --report-format=json
      --report-path=gitleaks-report.json
      --exit-code=0
      -v
    - |
      SECRETS=$(cat gitleaks-report.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
      echo "Secrets détectés: $SECRETS"
      if [ "$SECRETS" -gt "0" ]; then
        echo "🔴 ALERTE: $SECRETS secret(s) détecté(s) dans le code source!"
      fi
  artifacts:
    paths:
      - gitleaks-report.json
    when: always
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - when: always

# ─────────────────────────────────────────────
#  DEPLOY — Staging
# ─────────────────────────────────────────────
deploy:staging:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  environment:
    name: staging
    url: https://staging.monapp.com
    on_stop: stop:staging
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - apk add --no-cache curl
  script:
    - echo "🚀 Déploiement sur staging..."
    - docker pull $DOCKER_IMAGE
    - docker stop monapp-staging || true
    - docker rm monapp-staging || true
    - docker run -d
      --name monapp-staging
      --restart unless-stopped
      -p 8080:3000
      -e NODE_ENV=staging
      $DOCKER_IMAGE
    - echo "✅ Déploiement staging terminé"
    - sleep 10
    - curl -f http://localhost:8080/health || (echo "❌ Health check échoué" && exit 1)
  rules:
    - if: $ROLLBACK == "true"
      when: never
    - if: $SECURITY_SCAN_ONLY == "true"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $MANUAL_DEPLOY == "true" && $DEPLOY_ENV == "staging"
      when: on_success

stop:staging:
  stage: deploy
  script:
    - docker stop monapp-staging || true
    - docker rm monapp-staging || true
  environment:
    name: staging
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  allow_failure: true

# ─────────────────────────────────────────────
#  DEPLOY — Production
# ─────────────────────────────────────────────
deploy:production:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  environment:
    name: production
    url: https://monapp.com
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - apk add --no-cache curl
  script:
    - echo "🚀 Déploiement en PRODUCTION..."
    - docker pull $DOCKER_IMAGE
    # Blue-Green deployment simplifié
    - docker stop monapp-prod-old || true
    - docker rm monapp-prod-old || true
    - docker rename monapp-prod monapp-prod-old || true
    - docker run -d
      --name monapp-prod
      --restart unless-stopped
      -p 80:3000
      -e NODE_ENV=production
      $DOCKER_IMAGE
    - sleep 10
    - curl -f http://localhost/health && docker stop monapp-prod-old || true
    - echo "✅ Déploiement production terminé - $DOCKER_IMAGE"
  rules:
    - if: $MANUAL_DEPLOY == "true" && $DEPLOY_ENV == "production"
      when: on_success
  when: manual

# ─────────────────────────────────────────────
#  ROLLBACK
# ─────────────────────────────────────────────
rollback:production:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  script:
    - echo "⏪ Rollback vers la version précédente..."
    - docker stop monapp-prod || true
    - docker rm monapp-prod || true
    - docker rename monapp-prod-old monapp-prod || (echo "Pas de version précédente disponible" && exit 1)
    - docker start monapp-prod
    - echo "✅ Rollback effectué"
  rules:
    - if: $ROLLBACK == "true"
      when: always
  environment:
    name: production

# ─────────────────────────────────────────────
#  NOTIFY — Notifications Telegram
# ─────────────────────────────────────────────
.notify_base: &notify_base
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  variables:
    GIT_STRATEGY: none

notify:success:
  <<: *notify_base
  script:
    - |
      MESSAGE="✅ *Pipeline SUCCÈS*
      • Projet: $CI_PROJECT_NAME
      • Branche: \`$CI_COMMIT_REF_NAME\`
      • Commit: \`$CI_COMMIT_SHORT_SHA\`
      • Auteur: $CI_COMMIT_AUTHOR
      • [Voir pipeline]($CI_PIPELINE_URL)"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown" \
        -d "disable_web_page_preview=true"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success

notify:failure:
  <<: *notify_base
  script:
    - |
      MESSAGE="❌ *Pipeline ÉCHEC*
      • Projet: $CI_PROJECT_NAME
      • Branche: \`$CI_COMMIT_REF_NAME\`
      • Commit: \`$CI_COMMIT_SHORT_SHA\`
      • Auteur: $CI_COMMIT_AUTHOR
      • [Voir les erreurs]($CI_PIPELINE_URL)"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown" \
        -d "disable_web_page_preview=true"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_failure

notify:security-alert:
  <<: *notify_base
  script:
    - |
      # Vérifie les vulnérabilités critiques dans les rapports
      CRITICAL=0
      SECRETS=0
      
      if [ -f "gitleaks-report.json" ]; then
        SECRETS=$(python3 -c "import json; d=json.load(open('gitleaks-report.json')); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
      fi
      if [ -f "trivy-report.json" ]; then
        CRITICAL=$(python3 -c "
      import json
      d=json.load(open('trivy-report.json'))
      total=sum(len([v for v in r.get('Vulnerabilities',[]) if v.get('Severity')=='CRITICAL']) for r in d.get('Results',[]) if r.get('Vulnerabilities'))
      print(total)" 2>/dev/null || echo 0)
      fi
      
      if [ "$CRITICAL" -gt "0" ] || [ "$SECRETS" -gt "0" ]; then
        MESSAGE="🔴 *ALERTE SÉCURITÉ*
      • Projet: $CI_PROJECT_NAME
      • Vulnérabilités critiques: $CRITICAL
      • Secrets exposés: $SECRETS
      • [Voir rapport]($CI_PIPELINE_URL)"
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown" \
          -d "disable_web_page_preview=true"
      fi
  rules:
    - when: always
  allow_failure: true
